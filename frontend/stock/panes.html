<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Panes</title>
    <link rel="stylesheet" href="/frontend/css/diseño.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>

    <!-- Topbar (solo visible en móvil) -->
    <div class="topbar">
      <div class="title-business">
        <span>PANADERÍA Y PASTELERÍA RENZO</span>
      </div>
      <div class="btn-menu">
        <button class="hamburger" aria-label="abrir_menú">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">dashboard</div>
      <ul>
        <li>
          <a href="/frontend/index.html" data-page="home">
            <i class="fa-solid fa-house"></i>
            <span>Inicio</span>
          </a>
        </li>
        <li>
          <a href="#" class="activo">
            <i class="fa-solid fa-boxes-packing"></i>
            <span>Stock</span>
          </a>
        </li>
        <li>
          <a href="#">
            <i class="fas fa-clock-rotate-left"></i>
            <span>Historial</span>
          </a>
        </li>
      </ul>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">

      <!-- Formulario de ingreso -->
      <div class="ingreso-produccion">
        <select id="tipo-pan">
          <option value="">Tipo de pan</option>
          <option value="pan-frances">Pan francés</option>
          <option value="pan-ciabatta">Pan ciabatta</option>
          <option value="pan-yema">Pan yema</option>
          <option value="pan-carioco">Pan carioco</option>
          <option value="pan-hamburguesa">Pan hamburguesa</option>
        </select>

        <input type="number" min="0" placeholder="Cantidad de pan" id="cantidad-pan" />

        <select id="turno">
          <option value="">Turno</option>
          <option value="manana">Mañana</option>
          <option value="tarde">Tarde</option>
        </select>

        <input type="number" min="0" placeholder="Cantidad de latas" id="can-latas" />

        <button id="btn-registrar">Registrar</button>
      </div>

      <!-- Tabla de resultados -->
      <div class="table-responsive mx-3">
        <table class="table table-striped table-bordered table-hover">
          <thead class="table-dark">
            <tr>
              <th>Tipo de pan</th>
              <th>Turno</th>
              <th>Cantidad de pan</th>
              <th>Cantidad de latas</th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>

    </main>

    <script src="/frontend/js/sidebar.js"></script>
    <script src="/frontend/js/panes.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
