<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Panes</title>
    <link rel="stylesheet" href="/frontend/css/diseño.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">    
  </head>
  <body>
    <!-- Topbar (solo visible en móvil) -->
    <div class="topbar">
      <div class="title-business">
        <span>PANADERÍA Y PASTELERÍA RENZO</span>
      </div>
      <div class="btn-menu">
        <button class="hamburguer" aria-label="abrir_menú">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">dashboard</div>
      <ul>
        <li>
          <a href="/frontend/index.html" data-page="home">
            <i class="fa-solid fa-house"></i>
            <span>Inicio</span>
          </a>
        </li>
        <li>
          <a href="#" class="activo">
            <i class="fa-solid fa-boxes-packing"></i>
            <span>Stock</span>
          </a>
        </li>
        <li>
          <a href="#">
            <i class="fas fa-clock-rotate-left"></i>
            <span>Historial</span>
          </a>
        </li>
      </ul>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">
      <!-- Formulario de ingreso -->

      <div class="ingreso-produccion">
        <select id="bocadito-nombre">
          <option value="">Bocadito</option>
          <option value="cono">Cono</option>
          <option value="alfajor">Afajor</option>
          <option value="empanadita">Empanadita</option>
          <option value="cono-chico">Cono pequeño</option>
          <option value="alfajor-chico">Alfajor pequeño</option>
        </select>

        <input
          type="number"
          min="0"
          placeholder="Cantidad de pan"
          id="cantidad-pan"
        />
        <button id="btn-registrar">Registrar</button>
      </div>
    
    
      <table class="table table-striped table-hover">
      <!-- Tabla de resultados -->
      <div class="table-responsive mb-3">
        <table class="table table-striped table-bordered table-hover">
          <thead class="table-dark">
            <div class="mx-3">
            <tr>
              <th>Bocadito</th>
              <th>Cantidad</th>
            </tr>
            </div>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>
    </main>
</table>
    <script src="/frontend/js/sidebar.js"></script>
    <script src="/frontend/js/panes.js"></script>
  </body>
</html>
