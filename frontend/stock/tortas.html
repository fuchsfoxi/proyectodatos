<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Bocaditos</title>
    <link rel="stylesheet" href="/frontend/css/diseño.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Topbar (solo visible en móvil) -->
    <div class="topbar">
      <div class="title-business">
        <span>PANDAERIA Y PASTELERIA RENZO</span>
      </div>
      <div class="btn-menu" id="btn-menu">
        <button class="hamburger" aria-label="abrir_menú">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
    </div>


    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">dashboard</div>
      <ul>
        <li>
          <a href="/frontend/index.html" data-page="home">
            <i class="fa-solid fa-house"></i>
            <span>Inicio</span>
          </a>
        </li>
        <li class="nav-item-dropdown">
<a href="/frontend/stock.html" class="nav-link-dropdown">
    <i class="fa-solid fa-boxes-packing"></i>
    <span>Stock</span>
    <i class="fa-solid fa-chevron-down flecha"></i>
</a>
          <ul class="submenu">
            <li><a href="/frontend/stock/panes.html">Panes</a></li>
            <li><a href="/frontend/stock/bocaditos.html">Bocaditos</a></li>
            <li><a href="/frontend/stock/tortas.html">Tortas</a></li>
          </ul>
        </li>
        <li>
          <a href="#">
            <i class="fas fa-clock-rotate-left"></i>
            <span>Historial</span>
          </a>
        </li>
      </ul>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">
      <!-- Formulario de ingreso -->
      <div class="ingreso-produccion">
        <select id="tortas-nombre">
          <option value="">Tortas</option>
          <option value="torta-choc">Torta de chocolate</option>
          <option value="torta-choc-chica">Torta de chocolate chica</option>
          <option value="torta-vain">torta de vainilla</option>
          <option value="torta-vain-chica">torta de vainilla chica</option>
          <option value="tres-leches">tres leches</option>
          <option value="torta-eleada">torta helada</option>
        </select>

        <input
          type="number"
          min="0"
          placeholder="Cantidad"
          id="cantidad-torta"
        />

        <button id="btn-registrar">Registrar</button>
      </div>

      <!-- Tabla de resultados -->
      <div class="table-responsive mx-3">
        <table class="table table-striped table-bordered table-hover">
          <thead class="table-dark">
            <tr>
              <th>tortas</th>
              <th>Cantidad</th>
            </tr>
          </thead>
          <tbody id="tabla-body"></tbody>
        </table>
      </div>
    </main>

    <script src="/frontend/js/sidebar.js"></script>
    <script src="/frontend/js/tortas.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
