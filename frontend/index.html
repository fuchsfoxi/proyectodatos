<!doctype html>
<html lang="Es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/frontend/css/diseño.css" />
  </head>

  <body>
    <!-- Topbar (solo visible en móvil)  -->
    <div class="topbar">
      <div class="title-business">
        <span>PANDAERIA Y PASTELERIA RENZO</span>
      </div>
      <div class="btn-menu" id="btn-menu">
        <button class="hamburger" id="hamburger" aria-label="abrir_menú">
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- SIDEBAR   -->

    <aside class="sidebar">
      <div class="sidebar-logo">dashboard</div>
      <ul>
        <li>
          <a href="/frontend/index.html" class="activo" data-page="home">
            <i class="fa-solid fa-house"></i>
            <span>Inicio</span>
          </a>
        </li>
        <li class="nav-item-dropdown">
          <a href="/frontend/stock.html" data-page="home">
            <i class="fa-solid fa-boxes-packing"></i>
            <span>Stock</span>
          </a>
        </li>
        <li>
          <a href="/frontend/historial.html" data-page="home">
            <i class="fas fa-clock-rotate-left"></i>
            <span>Historial</span>
          </a>
        </li>
      </ul>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">
      <div class="dashboard-wrapper">
        <!-- Vistazo rápido -->
        <div class="fade-up">
          <p class="section-label">Vistazo rápido</p>
          <div class="resumen-grid">
            <div class="resumen-card">
              <div class="rc-icon green"><i class="fa-solid fa-bread-slice"></i></div>
              <div class="rc-value" id="vr-total-panes">—</div>
              <div class="rc-label">Panes producidos</div>
            </div>
            <div class="resumen-card">
              <div class="rc-icon amber"><i class="fa-solid fa-cookie"></i></div>
              <div class="rc-value" id="vr-total-bocaditos">—</div>
              <div class="rc-label">Bocaditos producidos</div>
            </div>
            <div class="resumen-card">
              <div class="rc-icon rose"><i class="fa-solid fa-cake-candles"></i></div>
              <div class="rc-value" id="vr-total-tortas">—</div>
              <div class="rc-label">Tortas producidas</div>
            </div>
            <div class="resumen-card">
              <div class="rc-icon blue"><i class="fa-solid fa-clipboard-list"></i></div>
              <div class="rc-value" id="vr-total-registros">—</div>
              <div class="rc-label">Registros totales</div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="/frontend/js/vistazo_rapido.js"></script>
  </body>

  <script src="/frontend/js/sidebar.js"></script>
</html>
