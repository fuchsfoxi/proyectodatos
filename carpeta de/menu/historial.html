<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../renzo.css">
    <script src="../renzo.js"></script>
</head>
<body>
    <header class="superior-historial">
        <h1>Historial</h1>
    </header>

    <button class="menu-btn" id="menu-btn">
        <i class="fa-solid fa-bars"></i>
    </button>

    <main class="contenido-historial">
        <div class="formulario-historial">
            <label>Fecha</label>
            <input type="date" name="fecha">

            <label>Turno</label>
            <select name="turno">
                <option value="">Turno</option>
                <option>Mañana</option>
                <option>Noche</option>
            </select>

            <label>Tipo</label>
            <select name="tipo">
                <option value="">Tipo</option>
                <option>Pan</option>
                <option>Pastel</option>
                <option>Bocaditos</option>
            </select>

            <button type="button">Buscar</button>
        </div>
    </main>

    <aside class="ventana-lateral" id="menu">
        
        <button id="cerrar-menu">
            <h2>Menu</h2>
            <i class="fa-solid fa-xmark"></i>
        </button>
        <nav>
            <a href="../renzo.html">Inicio</a>
            <a href="historial.html">Historial</a>
            <a href="grafico.html">Graficos</a>
        </nav>
    </aside>
</body>
</html>
