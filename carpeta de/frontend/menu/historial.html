<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../renzo.css">
</head>
<body>

    <!-- TOPBAR (solo móvil) -->
    <div class="topbar">
        <span class="topbar-logo">RENZO</span>
        <button class="btn-hamburguesa" id="btn-abrir">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>

    <!-- OVERLAY -->
    <div class="overlay" id="overlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">RENZO</div>
        <nav>
            <a href="/carpeta de/frontend/renzo.html">Inicio</a>
            <a href="">Historial</a>
            <a href="grafico.html">Gráficos</a>
        </nav>
    </aside>

    <!-- MAIN -->
    <main>

        <!-- Filtros chip -->
        <div class="filtros-historial">

            <div class="chip-wrapper">
                <select name="tipo" class="chip-select">
                    <option value="">Tipo</option>
                    <option>Pan</option>
                    <option>Pastel</option>
                    <option>Bocaditos</option>
                </select>
            </div>

            <div class="chip-wrapper">
                <select name="turno" class="chip-select">
                    <option value="">Turno</option>
                    <option>Mañana</option>
                    <option>Noche</option>
                </select>
            </div>

            <div class="chip-wrapper chip-fecha">
                <input type="date" name="fecha" class="chip-select">
            </div>

        </div>

        <!-- Lista de resultados -->
        <div class="lista-cartas" id="lista-resultados">
        </div>

    </main>

    <script src="/carpeta de/frontend/sidebar.js"></script>

</body>
</html>
