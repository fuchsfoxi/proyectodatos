<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bocaditos</title>
    <link rel="stylesheet" href="../renzo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header class="superior-bocaditos">
        <h1>Bocaditos</h1>
    </header>

    <div class="btn-general">
        <a href="../renzo.html" class="btn-volver">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <button class="menu-btn" id="menu-btn">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>

    <main class="contenido-bocaditos">
        <form class="formulario-bocaditos">
            <div class="columna-izquierda">
                <select id="input-tipo">
                    <option value="">TIPO DE BOCADITO</option>
                    <option>Conos</option>
                    <option>Orejitas</option>
                    <option>Orejitas grandes</option>
                    <option>Orejitas pequeñas</option>
                    <option>Pionono chico</option>
                    <option>Pionono grande</option>
                </select>
            </div>

            <div class="columna-derecha">
                <input type="number" id="input-cantidad" placeholder="CANTIDAD" min="0">
            </div>

            <button type="button" id="btn-guardar">Guardar</button>
        </form>

        <div class="lista-cartas" id="lista-cartas"></div>
    </main>

    <aside class="ventana-lateral" id="menu">
        <button id="cerrar-menu">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <nav>
            <a href="../renzo.html">Inicio</a>
            <a href="../menu/historial.html">Historial</a>
            <a href="../menu/grafico.html">Graficos</a>
            <a href="panes.html">Panes</a>
            <a href="pasteles.html">Tortas</a>
        </nav>
    </aside>
<script src="/carpeta de/renzo.js"></script>
</body>
</html>
