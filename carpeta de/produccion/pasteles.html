<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasteles</title>
    <link rel="stylesheet" href="../renzo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="../renzo.js"></script>
</head>
<body>
    <header class="superior-tortas">
        <h1>Tortas</h1>
    </header>

    <div class="btn-general">
        <a href="../renzo.html" class="btn-volver">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <button class="menu-btn" id="menu-btn">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>

    <main class="contenido-tortas">
        <form class="formulario-tortas">
            <div class="columna-izquierda">
                <select id="input-tipo">
                    <option value="">TIPO DE TORTA</option>
                    <option>Torta de chocolate grande</option>
                    <option>Torta de chocolate pequeña</option>
                    <option>Torta vainilla grande</option>
                    <option>Torta de vainilla pequeña</option>
                    <option>Tres leches pequeño</option>
                    <option>Tres leches grande</option>
                </select>
            </div>

            <div class="columna-derecha">
                <input type="number" id="input-latas" placeholder="CANTIDAD DE LATA" min="0">
            </div>

            <button type="button" id="btn-guardar">Guardar</button>
        </form>

        <div class="lista-cartas" id="lista-cartas"></div>
    </main>

    <aside class="ventana-lateral" id="menu">
        <button id="cerrar-menu">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <nav>
            <a href="../renzo.html">Inicio</a>
            <a href="../menu/historial.html">Historial</a>
            <a href="../menu/grafico.html">Graficos</a>
            <a href="panes.html">Panes</a>
            <a href="bocaditos.html">Bocaditos</a>
        </nav>
    </aside>
</body>
</html>
